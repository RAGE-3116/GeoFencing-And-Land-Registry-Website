<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Properties - Digital Land Registry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">🏠 LandRegistry</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="map.html">Map</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="auctions.html">Auctions</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="verify.html">Verify</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="authLink" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="mb-4">Property Verification</h2>

        <!-- Admin Mode Indicator -->
        <div id="adminIndicator" class="alert alert-success d-none">
            <strong>🔓 Admin Mode Activated</strong> - You can now verify properties
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Properties List -->
        <div id="propertiesList" class="row g-4">
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading properties...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:5000';
        const SECRET_CODE = 'iamadmin'; // Secret code to activate admin mode
        let adminMode = false;
        let typedKeys = '';

        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        // Hidden admin mode activation
        document.addEventListener('keypress', (e) => {
            typedKeys += e.key.toLowerCase();
            
            // Keep only last characters matching secret code length
            if (typedKeys.length > SECRET_CODE.length) {
                typedKeys = typedKeys.slice(-SECRET_CODE.length);
            }
            
            // Check if secret code was typed
            if (typedKeys === SECRET_CODE && !adminMode) {
                activateAdminMode();
            }
        });

        function activateAdminMode() {
            adminMode = true;
            document.getElementById('adminIndicator').classList.remove('d-none');
            showAlert('Admin mode activated! You can now verify properties.', 'success');
            loadProperties();
        }

        // Load all properties
        async function loadProperties() {
            try {
                const response = await fetch(`${API_URL}/api/properties`);
                const properties = await response.json();

                const propertiesList = document.getElementById('propertiesList');

                if (properties.length === 0) {
                    propertiesList.innerHTML = `
                        <div class="col-12 text-center text-muted">
                            <h4>No properties registered yet</h4>
                        </div>
                    `;
                    return;
                }

                propertiesList.innerHTML = properties.map(property => `
                    <div class="col-md-6 col-lg-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${property.property_name}</h5>
                                <p class="--text-primary mb-2">Owner: ${property.owner}</p>
                                <p class="--text-primary mb-2">Property ID: ${property.id}</p>
                                
                                <div class="mb-3">
                                    ${property.verified ? `
                                        <span class="verify-badge verified">
                                            ✓ Verified
                                        </span>
                                    ` : `
                                        <span class="verify-badge unverified">
                                            ✗ Unverified
                                        </span>
                                    `}
                                </div>

                                ${adminMode && !property.verified ? `
                                    <button class="btn btn-success w-100" onclick="verifyProperty(${property.id})">
                                        ✓ Verify Property
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading properties:', error);
                showAlert('Failed to load properties', 'danger');
            }
        }

        // Verify property
        async function verifyProperty(propertyId) {
            if (!adminMode) {
                showAlert('Admin mode required to verify properties', 'danger');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/verify-property`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: propertyId })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Property verified successfully!', 'success');
                    loadProperties();
                } else {
                    showAlert(data.message || 'Failed to verify property', 'danger');
                }
            } catch (error) {
                showAlert('Error verifying property', 'danger');
                console.error(error);
            }
        }

        // Update navbar
        const loggedInUser = localStorage.getItem('loggedInUser');
        const authLink = document.getElementById('authLink');
        if (loggedInUser) {
            authLink.textContent = 'Profile';
            authLink.href = 'profile.html';
        }

        // Load properties on page load
        loadProperties();
    </script>
</body>
</html>
